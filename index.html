<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Maintenance - Pinktec</title>
<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
}
.box {
  background: rgba(255,255,255,0.05);
  padding:40px;
  border-radius:20px;
  backdrop-filter: blur(10px);
}
h1 { font-size:32px; margin-bottom:10px; }
p { opacity:0.8; }
.loader {
  margin:20px auto;
  width:40px;
  height:40px;
  border:4px solid #fff;
  border-top:4px solid transparent;
  border-radius:50%;
  animation: spin 1s linear infinite;
}
@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>
<body>
<div class="box">
  <h1>🚧 Server Offline</h1>
  <div class="loader"></div>
  <p>Server sedang dalam pemulihan<br>Silakan kembali beberapa saat lagi</p>
</div>
</body>
</html>
